<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>THE BOOK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap');

:root {
  --black:    #06060a;
  --felt:     #0b0b12;
  --card:     #0f0f1a;
  --card2:    #141420;
  --border:   #1e1e30;
  --border2:  #2a2a40;
  --neon:     #f0158a;
  --neon-dim: #8a0050;
  --neon-glow:#f0158a88;
  --amber:    #ffb700;
  --amber-dim:#7a5500;
  --green:    #00e87a;
  --red:      #ff3d5a;
  --muted:    #44445a;
  --text:     #e8e8f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.header {
  background: var(--black);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
}
.logo {
  font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700;
  letter-spacing: 4px; color: var(--neon); text-transform: uppercase;
  text-shadow: 0 0 10px var(--neon-glow), 0 0 30px var(--neon-glow);
}
.logo span { color: var(--amber); text-shadow: 0 0 10px #ffb70088; }
.header-pnl {
  font-family: 'Roboto Mono', monospace; font-size: 13px; font-weight: 600;
  padding: 5px 10px; border-radius: 6px; background: var(--card); border: 1px solid var(--border2);
}
.header-pnl.up   { color: var(--green); border-color: #00e87a44; }
.header-pnl.down { color: var(--red);   border-color: #ff3d5a44; }
.header-pnl.flat { color: var(--muted); }

.ticker-wrap { overflow: hidden; background: #0a0a14; border-top: 1px solid #1a1a28; padding: 5px 0; height: 26px; }
.ticker { display: flex; gap: 32px; animation: ticker 22s linear infinite; white-space: nowrap; }
.ticker-item { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
.ticker-item .t-cap { color: var(--amber); font-weight: 600; }
.ticker-item .t-plus { color: var(--green); }
.ticker-item .t-minus { color: var(--red); }
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

.tabs { display: flex; background: var(--black); border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 12px 8px;
  font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  border: none; background: transparent; color: var(--muted);
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab.active { color: var(--neon); border-bottom-color: var(--neon); text-shadow: 0 0 12px var(--neon-glow); }

.content { padding: 16px; }

/* UPLOAD ZONE */
.upload-zone {
  position: relative; border: 1.5px dashed var(--neon-dim); border-radius: 12px;
  padding: 28px 16px; text-align: center; cursor: pointer;
  background: radial-gradient(ellipse at center, #1a0a1a 0%, var(--felt) 70%);
  margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s;
}
.upload-zone::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(240,21,138,0.03) 2px, rgba(240,21,138,0.03) 4px);
  pointer-events: none;
}
.upload-zone.hot { border-color: var(--neon); background: radial-gradient(ellipse at center, #250a20 0%, var(--felt) 70%); }
.upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 34px; margin-bottom: 10px; filter: drop-shadow(0 0 8px var(--neon-glow)); }
.upload-label { font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 1px; color: var(--neon); text-transform: uppercase; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: var(--muted); }
.preview-img { width: 100%; max-height: 170px; object-fit: contain; border-radius: 8px; margin-bottom: 8px; }
.img-ok { font-size: 12px; color: var(--green); font-weight: 600; font-family: 'Roboto Mono', monospace; }

/* FIELDS */
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.field-full { grid-column: 1 / -1; }
.field-block { margin-bottom: 0; }
.field-label {
  font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 6px; display: block;
}
.field-input {
  width: 100%; background: var(--card); border: 1px solid var(--border2);
  border-radius: 8px; padding: 11px 12px; color: var(--text);
  font-size: 15px; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none;
}
.field-input:focus { border-color: var(--neon); box-shadow: 0 0 0 3px rgba(240,21,138,0.12); }
.field-input::placeholder { color: #33334a; }

/* OUTCOME */
.outcome-row { display: flex; gap: 8px; margin-bottom: 16px; }
.out-btn {
  flex: 1; padding: 11px 6px; border-radius: 8px; border: 1.5px solid var(--border2);
  font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 1px; cursor: pointer; background: var(--card); color: var(--muted);
  transition: all 0.15s; text-transform: uppercase;
}
.out-btn.active-pending { background: #1a1800; border-color: var(--amber); color: var(--amber); box-shadow: 0 0 10px rgba(255,183,0,0.2); }
.out-btn.active-win     { background: #001a0e; border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(0,232,122,0.2); }
.out-btn.active-loss    { background: #1a000a; border-color: var(--red);   color: var(--red);   box-shadow: 0 0 10px rgba(255,61,90,0.2); }

/* PARSE BTN */
.parse-btn {
  width: 100%; background: linear-gradient(135deg, #c0106e, var(--neon));
  color: #fff; border: none; border-radius: 10px; padding: 15px;
  font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 20px rgba(240,21,138,0.35);
}
.parse-btn:active { transform: scale(0.98); }
.parse-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

/* STATUS */
.status-msg {
  margin-top: 12px; padding: 12px 14px; border-radius: 8px;
  font-size: 13px; font-family: 'Roboto Mono', monospace;
  display: none; line-height: 1.5;
}
.status-msg.loading { display: block; background: #0d0d20; color: var(--neon); border: 1px solid var(--neon-dim); }
.status-msg.success { display: block; background: #001a0e; color: var(--green); border: 1px solid #00e87a44; }
.status-msg.error   { display: block; background: #1a000a; color: var(--red);   border: 1px solid #ff3d5a44; }

/* PARSED PREVIEW */
.parsed-preview {
  background: #080814; border: 1px solid var(--neon-dim);
  border-radius: 12px; padding: 16px; margin-top: 14px; display: none;
  box-shadow: 0 0 20px rgba(240,21,138,0.1);
}
.parsed-preview.show { display: block; }
.preview-head {
  font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--neon);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
  text-shadow: 0 0 8px var(--neon-glow);
}
.prow { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.prow:last-of-type { border-bottom: none; }
.prow .pk { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-family: 'Oswald', sans-serif; }
.prow .pv { color: var(--text); font-weight: 600; text-align: right; max-width: 65%; font-family: 'Roboto Mono', monospace; font-size: 12px; }
.confirm-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-confirm {
  flex: 1; background: var(--green); color: #001a0e; border: none; border-radius: 8px; padding: 13px;
  font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
}
.btn-redo {
  flex: 1; background: var(--card); color: var(--muted); border: 1px solid var(--border2);
  border-radius: 8px; padding: 13px; font-family: 'Oswald', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
}

/* MANUAL FALLBACK */
.manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.manual-grid .field-block { margin-bottom: 0; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 8px; text-align: center;
  position: relative; overflow: hidden;
}
.stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.stat-card.c-neon::after  { background: var(--neon);  box-shadow: 0 0 8px var(--neon); }
.stat-card.c-green::after { background: var(--green); box-shadow: 0 0 8px var(--green); }
.stat-card.c-amber::after { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.stat-card.c-red::after   { background: var(--red);   box-shadow: 0 0 8px var(--red); }
.stat-v { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
.stat-v.neon  { color: var(--neon);  text-shadow: 0 0 10px var(--neon-glow); }
.stat-v.green { color: var(--green); text-shadow: 0 0 10px #00e87a55; }
.stat-v.amber { color: var(--amber); text-shadow: 0 0 10px #ffb70055; }
.stat-v.red   { color: var(--red);   text-shadow: 0 0 10px #ff3d5a55; }
.stat-l { font-family: 'Oswald', sans-serif; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }

/* FILTERS */
.filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; -ms-overflow-style: none; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-family: 'Oswald', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border: 1px solid var(--border2); white-space: nowrap;
  background: var(--card); color: var(--muted); transition: all 0.15s;
}
.chip.active { background: var(--neon); color: #fff; border-color: var(--neon); box-shadow: 0 0 12px var(--neon-glow); }

/* BET CARDS */
.bet-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 10px;
  position: relative; overflow: hidden;
}
.bet-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.bet-card.win-card::before  { background: var(--green); box-shadow: 0 0 8px var(--green); }
.bet-card.loss-card::before { background: var(--red);   box-shadow: 0 0 8px var(--red); }
.bet-card.pend-card::before { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.bet-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.bet-capper { font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; color: var(--neon); text-transform: uppercase; }
.badge { font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; }
.badge.win     { background: #001a0e; color: var(--green); border: 1px solid #00e87a44; }
.badge.loss    { background: #1a000a; color: var(--red);   border: 1px solid #ff3d5a44; }
.badge.pending { background: #1a1800; color: var(--amber); border: 1px solid #ffb70044; }
.bet-pick { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.bet-meta { display: flex; gap: 12px; flex-wrap: wrap; font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--muted); }
.bet-meta .odds-val  { color: var(--amber); font-weight: 600; }
.bet-meta .wager-val { color: var(--text); }
.bet-pnl { font-family: 'Roboto Mono', monospace; font-size: 16px; font-weight: 700; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.bet-pnl.up   { color: var(--green); text-shadow: 0 0 8px #00e87a55; }
.bet-pnl.down { color: var(--red);   text-shadow: 0 0 8px #ff3d5a55; }
.bet-update { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.upd-btn {
  flex: 1; padding: 7px 4px; border-radius: 6px;
  font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer;
  border: 1px solid var(--border2); background: var(--card2); color: var(--muted); transition: all 0.15s;
}
.upd-btn.u-win  { border-color: var(--green); color: var(--green); background: #001a0e; }
.upd-btn.u-loss { border-color: var(--red);   color: var(--red);   background: #1a000a; }
.upd-btn.u-del  { border-color: #333; color: #444; }

/* CAPPERS */
.capper-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.capper-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon), transparent); opacity: 0.5;
}
.capper-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.capper-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.capper-stat { text-align: center; }
.cs-val { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.cs-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'Oswald', sans-serif; }

.export-btn {
  width: 100%; background: var(--card); color: var(--amber);
  border: 1px solid var(--amber-dim); border-radius: 10px; padding: 13px;
  font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-bottom: 14px;
}
.section-label {
  font-family: 'Oswald', sans-serif; font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 2px; margin: 4px 0 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }
.empty p { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 1px; line-height: 1.8; text-transform: uppercase; }
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green); color: #001a0e;
  font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; padding: 12px 24px;
  border-radius: 30px; z-index: 999;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,232,122,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">The <span>Book</span></div>
    <div class="header-pnl flat" id="headerPnl">$0.00</div>
  </div>
  <div class="ticker-wrap"><div class="ticker" id="ticker"><span class="ticker-item">No bets yet — log your first bet above</span><span class="ticker-item">No bets yet — log your first bet above</span></div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">+ Add</button>
  <button class="tab" onclick="switchTab('bets')">Bets</button>
  <button class="tab" onclick="switchTab('cappers')">Cappers</button>
</div>

<!-- ADD TAB -->
<div id="tab-add" class="content">
  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)">
    <div id="uploadInner">
      <div class="upload-icon">📸</div>
      <div class="upload-label">Upload Bet Slip</div>
      <div class="upload-sub">Tap to attach screenshot</div>
    </div>
  </div>

  <div class="field-grid">
    <div class="field-block field-full">
      <label class="field-label">Capper</label>
      <input type="text" class="field-input" id="f_capper" placeholder="Who's the pick from?" autocomplete="off" oninput="checkReady()">
    </div>
  </div>

  <label class="field-label">Result</label>
  <div class="outcome-row">
    <button class="out-btn active-pending" id="ob-pending" onclick="selectOutcome('Pending')">⏳ Open</button>
    <button class="out-btn" id="ob-win"     onclick="selectOutcome('Win')">✅ Won</button>
    <button class="out-btn" id="ob-loss"    onclick="selectOutcome('Loss')">❌ Lost</button>
  </div>

  <button class="parse-btn" id="parseBtn" onclick="parseBet()" disabled>Read Slip &amp; Log</button>
  <div class="status-msg" id="statusMsg"></div>
  <div class="parsed-preview" id="parsedPreview"></div>
</div>

<!-- BETS TAB -->
<div id="tab-bets" class="content" style="display:none">
  <div class="stats-row" id="statsRow"></div>
  <div class="filter-row" id="filterRow"></div>
  <button class="export-btn" onclick="exportCSV()">⬇ &nbsp;Export CSV</button>
  <div class="section-label">Recent Action</div>
  <div id="betsList"></div>
</div>

<!-- CAPPERS TAB -->
<div id="tab-cappers" class="content" style="display:none">
  <div class="section-label">Leaderboard</div>
  <div id="cappersList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'thebook_v3';
let bets = [];
let outcome = 'Pending';
let activeFilter = 'All';
let imgBase64 = null;
let imgMime = 'image/jpeg';
let parsedData = null;

function save() { try { localStorage.setItem(SK, JSON.stringify(bets)); } catch(e) {} }
function load() { try { const d = localStorage.getItem(SK); if (d) bets = JSON.parse(d); } catch(e) { bets=[]; } }

function buildTicker() {
  const items = bets.length
    ? [...bets.slice(0,8), ...bets.slice(0,8)].map(b => {
        const p = calcPnL(b);
        const sc = b.outcome==='Win'?'t-plus':b.outcome==='Loss'?'t-minus':'';
        const ps = b.outcome==='Pending'?'OPEN':(p>=0?'+$':'-$')+Math.abs(p).toFixed(0);
        return `<span class="ticker-item"><span class="t-cap">${b.capper}</span> ${b.pick||'Bet'} <span class="${sc}">${b.odds||''} ${ps}</span></span>`;
      })
    : ['<span class="ticker-item">No bets yet — log your first bet above</span>',
       '<span class="ticker-item">No bets yet — log your first bet above</span>'];
  document.getElementById('ticker').innerHTML = items.join('');
}

function updateHeaderPnl() {
  const t = bets.reduce((s,b)=>s+calcPnL(b),0);
  const el = document.getElementById('headerPnl');
  el.textContent = (t>=0?'+$':'-$')+Math.abs(t).toFixed(2);
  el.className = 'header-pnl '+(t>0?'up':t<0?'down':'flat');
}

function switchTab(t) {
  ['add','bets','cappers'].forEach(k => {
    document.getElementById('tab-'+k).style.display = k===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['add','bets','cappers'][i]===t);
  });
  if (t==='bets') renderBets();
  if (t==='cappers') renderCappers();
}

function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  imgMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    imgBase64 = ev.target.result.split(',')[1];
    document.getElementById('uploadInner').innerHTML =
      `<img src="${ev.target.result}" class="preview-img"><div class="img-ok">✓ Slip loaded — enter capper below</div>`;
    document.getElementById('uploadZone').classList.add('hot');
    checkReady();
  };
  reader.readAsDataURL(file);
}

function checkReady() {
  const ok = imgBase64 && document.getElementById('f_capper').value.trim();
  document.getElementById('parseBtn').disabled = !ok;
}

function selectOutcome(o) {
  outcome = o;
  document.getElementById('ob-pending').className = 'out-btn'+(o==='Pending'?' active-pending':'');
  document.getElementById('ob-win').className     = 'out-btn'+(o==='Win'?' active-win':'');
  document.getElementById('ob-loss').className    = 'out-btn'+(o==='Loss'?' active-loss':'');
}

async function parseBet() {
  const capper = document.getElementById('f_capper').value.trim();
  if (!imgBase64 || !capper) return;

  const btn = document.getElementById('parseBtn');
  btn.disabled = true; btn.textContent = 'Reading slip...';
  showStatus('loading', '◈ Analyzing your bet slip...');
  document.getElementById('parsedPreview').classList.remove('show');
  parsedData = null;

  const prompt = `Extract sports bet details from this slip. Return ONLY valid JSON, no markdown, no explanation:
{"teams":"matchup or event","bet_type":"Moneyline/Spread/Over-Under/Parlay/etc","pick":"specific selection","odds":"American odds e.g. -110 or +150","wager":"dollar amount number only","sport":"sport name","game_date":"date if visible or null","book":"sportsbook name or null"}
Use null for any field you cannot clearly read.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: imgMime, data: imgBase64 } },
          { type: "text", text: prompt }
        ]}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content.map(i => i.text||'').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    parsedData = JSON.parse(clean);
    parsedData.capper = capper;
    parsedData.outcome = outcome;
    parsedData.logged_at = new Date().toISOString();
    showStatus('success', '✓ Slip read — confirm below');
    renderParsed(parsedData);
  } catch(err) {
    showStatus('error', '⚠ Could not read slip. Fill in manually below.');
    showManual(capper);
  }
  btn.disabled = false; btn.textContent = 'Read Slip & Log';
}

function renderParsed(d) {
  const pnl = calcPnL(d);
  const pp = document.getElementById('parsedPreview');
  pp.classList.add('show');
  pp.innerHTML = `
    <div class="preview-head">◈ Confirm & Log</div>
    ${pr('Capper', d.capper)}
    ${pr('Sport', d.sport||'—')}
    ${pr('Pick', d.pick||d.teams||'—')}
    ${pr('Type', d.bet_type||'—')}
    ${pr('Odds', d.odds||'—')}
    ${pr('Wager', d.wager ? '$'+d.wager : '—')}
    ${pr('Book', d.book||'—')}
    ${pr('Result', d.outcome)}
    ${d.outcome!=='Pending' ? pr('P&L', (pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(2)) : ''}
    <div class="confirm-row">
      <button class="btn-confirm" onclick="confirmBet()">Lock It In</button>
      <button class="btn-redo" onclick="clearForm()">Redo</button>
    </div>`;
}

function pr(k, v) {
  return `<div class="prow"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;
}

function showManual(capper) {
  const pp = document.getElementById('parsedPreview');
  pp.classList.add('show');
  pp.innerHTML = `
    <div class="preview-head">Manual Entry</div>
    <div class="manual-grid">
      <div class="field-block" style="grid-column:1/-1"><label class="field-label">Pick / Teams</label><input class="field-input" id="m_teams" placeholder="Lakers ML"></div>
      <div class="field-block"><label class="field-label">Bet Type</label><input class="field-input" id="m_type" placeholder="Moneyline"></div>
      <div class="field-block"><label class="field-label">Sport</label><input class="field-input" id="m_sport" placeholder="NBA"></div>
      <div class="field-block"><label class="field-label">Odds</label><input class="field-input" id="m_odds" placeholder="-110"></div>
      <div class="field-block"><label class="field-label">Wager ($)</label><input class="field-input" id="m_wager" placeholder="50" type="number"></div>
    </div>
    <button class="btn-confirm" style="width:100%" onclick="logManual('${capper}')">Lock It In</button>`;
}

function logManual(capper) {
  parsedData = {
    id: Date.now(), capper, outcome, logged_at: new Date().toISOString(),
    teams: document.getElementById('m_teams')?.value||'',
    pick:  document.getElementById('m_teams')?.value||'',
    bet_type: document.getElementById('m_type')?.value||'',
    odds:  document.getElementById('m_odds')?.value||'',
    wager: document.getElementById('m_wager')?.value||'',
    sport: document.getElementById('m_sport')?.value||'', book: null
  };
  confirmBet();
}

function confirmBet() {
  if (!parsedData) return;
  if (!parsedData.id) parsedData.id = Date.now();
  bets.unshift(parsedData);
  save(); buildTicker(); updateHeaderPnl();
  showToast('Locked In ✓');
  document.getElementById('parsedPreview').classList.remove('show');
  setTimeout(clearForm, 600);
}

function clearForm() {
  imgBase64 = null; parsedData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('f_capper').value = '';
  document.getElementById('uploadZone').classList.remove('hot');
  document.getElementById('uploadInner').innerHTML = `
    <div class="upload-icon">📸</div>
    <div class="upload-label">Upload Bet Slip</div>
    <div class="upload-sub">Tap to attach screenshot</div>`;
  document.getElementById('parsedPreview').classList.remove('show');
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('parseBtn').disabled = true;
  selectOutcome('Pending');
}

function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg '+type; el.textContent = msg;
  if (type==='success') setTimeout(()=>el.style.display='none', 3500);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function calcPnL(bet) {
  const w = parseFloat(bet.wager)||0;
  const o = parseInt(bet.odds)||0;
  if (bet.outcome==='Win') {
    if (o>0) return parseFloat((w*o/100).toFixed(2));
    if (o<0) return parseFloat((w*100/Math.abs(o)).toFixed(2));
  }
  if (bet.outcome==='Loss') return -w;
  return 0;
}

function updateOutcome(id, newOutcome) {
  const bet = bets.find(b=>b.id===id); if (!bet) return;
  bet.outcome = newOutcome;
  save(); buildTicker(); updateHeaderPnl(); renderBets();
  showToast(newOutcome==='Win'?'Marked Won ✓':'Marked Lost');
}

function deleteBet(id) {
  bets = bets.filter(b=>b.id!==id);
  save(); buildTicker(); updateHeaderPnl(); renderBets();
  showToast('Bet Removed');
}

function renderBets() {
  const cappers = [...new Set(bets.map(b=>b.capper))];
  document.getElementById('filterRow').innerHTML =
    `<button class="chip ${activeFilter==='All'?'active':''}" onclick="setFilter('All')">All</button>`+
    cappers.map(c=>`<button class="chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');

  const fil = activeFilter==='All'?bets:bets.filter(b=>b.capper===activeFilter);
  const wins=fil.filter(b=>b.outcome==='Win').length;
  const losses=fil.filter(b=>b.outcome==='Loss').length;
  const pnl=fil.reduce((s,b)=>s+calcPnL(b),0);
  const wr=(wins+losses)>0?Math.round(wins/(wins+losses)*100):0;

  const wrCol=wr>=55?'green':wr>=45?'amber':'red';
  const wrCard=wr>=55?'c-green':wr>=45?'c-amber':'c-red';
  const pnlCol=pnl>=0?'green':'red';
  const pnlCard=pnl>=0?'c-green':'c-red';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card c-neon"><div class="stat-v neon">${fil.length}</div><div class="stat-l">Total</div></div>
    <div class="stat-card ${wrCard}"><div class="stat-v ${wrCol}">${wr}%</div><div class="stat-l">Win Rate</div></div>
    <div class="stat-card ${pnlCard}"><div class="stat-v ${pnlCol}">${pnl>=0?'+':'-'}$${Math.abs(pnl).toFixed(0)}</div><div class="stat-l">P&amp;L</div></div>`;

  const list = document.getElementById('betsList');
  if (!fil.length) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">🎯</div><p>No bets logged yet<br>Add your first slip above</p></div>`;
    return;
  }

  list.innerHTML = fil.map(b=>{
    const p=calcPnL(b);
    const cl=b.outcome==='Win'?'win-card':b.outcome==='Loss'?'loss-card':'pend-card';
    const bdg=b.outcome==='Win'?'win':b.outcome==='Loss'?'loss':'pending';
    const icon=b.outcome==='Win'?'✅':b.outcome==='Loss'?'❌':'⏳';
    const date=b.logged_at?new Date(b.logged_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    const isPending=b.outcome==='Pending';
    return `<div class="bet-card ${cl}">
      <div class="bet-top">
        <div class="bet-capper">${b.capper}</div>
        <div class="badge ${bdg}">${icon} ${b.outcome}</div>
      </div>
      <div class="bet-pick">${b.pick||b.teams||'Bet'}</div>
      <div class="bet-meta">
        ${b.sport?`<span>${b.sport}</span>`:''}
        ${b.odds?`<span class="odds-val">${b.odds}</span>`:''}
        ${b.wager?`<span class="wager-val">$${b.wager}</span>`:''}
        ${b.bet_type?`<span>${b.bet_type}</span>`:''}
        <span>${date}</span>
      </div>
      ${!isPending?`<div class="bet-pnl ${p>=0?'up':'down'}">${p>=0?'+':'-'}$${Math.abs(p).toFixed(2)}</div>`:''}
      <div class="bet-update">
        ${isPending?`<button class="upd-btn u-win" onclick="updateOutcome(${b.id},'Win')">✅ Won</button>`:''}
        ${isPending?`<button class="upd-btn u-loss" onclick="updateOutcome(${b.id},'Loss')">❌ Lost</button>`:''}
        <button class="upd-btn u-del" onclick="deleteBet(${b.id})">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f) { activeFilter=f; renderBets(); }

function renderCappers() {
  const map={};
  bets.forEach(b=>{ if (!map[b.capper]) map[b.capper]=[]; map[b.capper].push(b); });
  const list=document.getElementById('cappersList');
  if (!Object.keys(map).length) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">👤</div><p>No cappers yet<br>Log some bets first</p></div>`;
    return;
  }
  const sorted=Object.entries(map).sort((a,b)=>
    b[1].reduce((s,x)=>s+calcPnL(x),0)-a[1].reduce((s,x)=>s+calcPnL(x),0));
  list.innerHTML=sorted.map(([name,cbets],idx)=>{
    const wins=cbets.filter(b=>b.outcome==='Win').length;
    const losses=cbets.filter(b=>b.outcome==='Loss').length;
    const pnl=cbets.reduce((s,b)=>s+calcPnL(b),0);
    const wr=(wins+losses)>0?Math.round(wins/(wins+losses)*100):0;
    const wagered=cbets.reduce((s,b)=>s+(parseFloat(b.wager)||0),0);
    const roi=wagered>0?Math.round(pnl/wagered*100):0;
    const wrC=wr>=55?'var(--green)':wr>=45?'var(--amber)':'var(--red)';
    const pnlC=pnl>=0?'var(--green)':'var(--red)';
    const roiC=roi>=0?'var(--green)':'var(--red)';
    return `<div class="capper-card">
      <div class="capper-name">${idx===0?'🏆 ':''}${name}</div>
      <div class="capper-grid">
        <div class="capper-stat"><div class="cs-val" style="color:var(--neon)">${cbets.length}</div><div class="cs-lbl">Bets</div></div>
        <div class="capper-stat"><div class="cs-val" style="color:${wrC}">${wr}%</div><div class="cs-lbl">Win %</div></div>
        <div class="capper-stat"><div class="cs-val" style="color:${pnlC}">${pnl>=0?'+':'-'}$${Math.abs(pnl).toFixed(0)}</div><div class="cs-lbl">P&amp;L</div></div>
        <div class="capper-stat"><div class="cs-val" style="color:${roiC}">${roi>=0?'+':''}${roi}%</div><div class="cs-lbl">ROI</div></div>
      </div>
    </div>`;
  }).join('');
}

function exportCSV() {
  if (!bets.length) { showToast('No bets yet'); return; }
  const h=['Capper','Pick','Odds','Wager','Outcome','P&L','Sport','Type','Book','Date'];
  const rows=bets.map(b=>{
    const p=calcPnL(b);
    return [b.capper,b.pick||b.teams,b.odds,b.wager,b.outcome,p.toFixed(2),b.sport,b.bet_type,b.book,
      b.logged_at?new Date(b.logged_at).toLocaleDateString():''].map(v=>`"${v||''}"`).join(',');
  });
  const blob=new Blob([[h.join(','),...rows].join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='the_book.csv'; a.click();
}

load(); buildTicker(); updateHeaderPnl();
</script>
</body>
